<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vuka Deliver</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--brand:#D85A30;--brand-dark:#993C1D;--bg:#F5F3EF;--white:#fff;--black:#1a1a1a;--gray1:#f0ece6;--gray2:#e0dbd3;--gray3:#a0998f;--gray4:#6b6560;--text:#1a1a1a;--radius:14px}
body{font-family:'Outfit',sans-serif;background:#e8e0d6;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 12px 40px}

/* ── shell ─────────────────────────────── */
.shell{width:100%;max-width:390px}
.top-nav{display:flex;gap:6px;justify-content:center;margin-bottom:12px;background:#1a1a1a;border-radius:50px;padding:6px}
.tnb{flex:1;padding:8px 4px;border-radius:44px;border:none;background:transparent;color:#888;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.tnb.active{background:var(--brand);color:#fff}

/* phone frame */
.phone{background:var(--bg);border-radius:36px;border:8px solid #1a1a1a;overflow:hidden;height:680px;display:flex;flex-direction:column;position:relative;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:22px;background:#1a1a1a;border-radius:0 0 14px 14px;z-index:100}
.screen-wrap{margin-top:22px;flex:1;overflow:hidden;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;display:flex;flex-direction:column;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* ── common components ──────────────────── */
.hdr{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr h1{color:#fff;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hdr .sub{color:#888;font-size:11px;margin-top:1px}
.back{background:none;border:none;color:var(--brand);font-size:20px;cursor:pointer;padding:0 10px 0 0;font-family:inherit;line-height:1}

.hero{background:linear-gradient(135deg,var(--brand),var(--brand-dark));padding:20px 16px 24px;flex-shrink:0}
.hero h2{color:#fff;font-size:22px;font-weight:900;line-height:1.2}
.hero p{color:rgba(255,255,255,.7);font-size:12px;margin-top:3px}
.hero-search{width:100%;background:rgba(255,255,255,.2);border:none;border-radius:10px;padding:10px 14px;color:rgba(255,255,255,.7);font-size:13px;margin-top:14px;font-family:inherit;outline:none}

.cats-row{display:flex;gap:7px;padding:12px 14px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:#fff;border-bottom:1px solid var(--gray2)}
.cats-row::-webkit-scrollbar{display:none}
.cat{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--gray2);background:#fff;color:var(--gray4);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.cat.on{background:var(--brand);color:#fff;border-color:var(--brand)}

.rest-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.rc{background:#fff;border-radius:var(--radius);overflow:hidden;cursor:pointer;border:1px solid var(--gray2);transition:transform .12s,box-shadow .12s}
.rc:active{transform:scale(.97)}
.rc-img{height:70px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:-.2px;text-align:center;padding:0 6px;line-height:1.3}
.rc-body{padding:9px 10px 11px}
.rc-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.rc-cat{font-size:10px;color:var(--gray3);margin-top:2px}
.rc-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:10px}
.rc-stars{color:var(--brand);font-weight:700}
.rc-time{color:var(--gray3)}
.rc-fee{font-size:10px;color:#27a060;font-weight:600;margin-top:3px}

/* menu screen */
.menu-banner{padding:18px 16px 14px;background:#fff;border-bottom:1px solid var(--gray2);flex-shrink:0}
.menu-name{font-size:17px;font-weight:800;color:var(--text)}
.menu-meta{font-size:11px;color:var(--gray3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}
.menu-meta span{display:flex;align-items:center;gap:3px}
.section-hdr{padding:12px 14px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray3);flex-shrink:0;background:var(--bg)}
.mi{padding:12px 14px;border-bottom:1px solid #f5f2ee;display:flex;gap:12px;align-items:flex-start;background:#fff}
.mi-info{flex:1}
.mi-name{font-size:13px;font-weight:700;color:var(--text)}
.mi-desc{font-size:11px;color:var(--gray3);margin-top:3px;line-height:1.4}
.mi-price{font-size:13px;font-weight:700;color:var(--brand);margin-top:6px}
.mi-ctrl{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-top:2px}
.qb{width:28px;height:28px;border-radius:50%;border:1px solid var(--gray2);background:#fff;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-family:inherit}
.qb.add{background:var(--brand);color:#fff;border-color:var(--brand)}
.qn{font-size:14px;font-weight:700;min-width:16px;text-align:center;color:var(--text)}
.sticky-cart{position:sticky;bottom:0;padding:10px 14px 14px;background:var(--bg);border-top:1px solid var(--gray2)}
.cart-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:12px;padding:14px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;font-family:inherit}
.cart-pill{background:var(--brand);color:#fff;font-size:11px;padding:2px 9px;border-radius:10px;font-weight:700}

/* cart */
.cart-item{padding:12px 14px;border-bottom:1px solid #f5f2ee;display:flex;justify-content:space-between;align-items:center;background:#fff}
.ci-name{font-size:13px;font-weight:700;color:var(--text)}
.ci-sub{font-size:11px;color:var(--brand);margin-top:3px;font-weight:600}
.summary{margin:12px 14px;background:#fff;border-radius:var(--radius);padding:14px;border:1px solid var(--gray2)}
.sum-row{display:flex;justify-content:space-between;font-size:12px;color:var(--gray3);padding:4px 0}
.sum-total{display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--text);border-top:1px solid var(--gray2);padding-top:10px;margin-top:6px}
.sum-savings{text-align:center;font-size:11px;color:#27a060;font-weight:600;margin-top:8px;padding:6px;background:#edfaf3;border-radius:8px}
.pay-box{margin:0 14px 10px;background:#fff;border-radius:var(--radius);padding:14px;border:1px solid var(--gray2)}
.pay-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}
.pay-opt{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;padding:8px 10px;border-radius:10px;border:1px solid var(--gray2)}
.pay-opt.sel{border-color:var(--brand);background:#fff8f5}
.pay-opt-lbl{font-size:12px;font-weight:600;color:var(--text)}
.pay-opt-sub{font-size:10px;color:var(--gray3)}
.place-btn{margin:0 14px 16px;background:var(--brand);color:#fff;border:none;border-radius:12px;padding:15px;font-size:14px;font-weight:800;cursor:pointer;width:calc(100% - 28px);font-family:inherit;display:flex;justify-content:space-between;align-items:center}

/* address */
.addr-form{padding:14px;display:flex;flex-direction:column;gap:10px}
.lbl{font-size:11px;font-weight:700;color:var(--gray4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.inp{width:100%;background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:11px 13px;font-size:13px;font-family:inherit;color:var(--text);outline:none}
.inp:focus{border-color:var(--brand)}
select.inp{appearance:none;-webkit-appearance:none}

/* tracking */
.track-screen{padding:20px 16px;flex:1;overflow-y:auto}
.track-status{text-align:center;margin-bottom:24px}
.track-icon{font-size:48px;margin-bottom:10px}
.track-title{font-size:20px;font-weight:900;color:var(--text)}
.track-sub{font-size:12px;color:var(--gray3);margin-top:4px}
.track-num{font-size:11px;font-weight:700;color:var(--brand);margin-top:6px;letter-spacing:.3px}
.eta-bar{background:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--gray2)}
.eta-lbl{font-size:11px;color:var(--gray3);font-weight:600}
.eta-val{font-size:18px;font-weight:900;color:var(--brand)}
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:14px;align-items:flex-start;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:18px;top:38px;width:2px;height:32px;background:var(--gray2)}
.step:not(:last-child).done::after{background:var(--brand)}
.step-dot{width:36px;height:36px;border-radius:50%;background:#fff;border:2px solid var(--gray2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:all .3s}
.step-dot.done{background:var(--brand);border-color:var(--brand)}
.step-dot.active{background:#fff;border-color:var(--brand);box-shadow:0 0 0 4px rgba(216,90,48,.15)}
.step-body{padding-top:6px;padding-bottom:24px}
.step-label{font-size:13px;font-weight:700;color:var(--gray2)}
.step-label.done,.step-label.active{color:var(--text)}
.step-note{font-size:11px;color:var(--gray3);margin-top:2px}
.order-detail-card{background:#fff;border-radius:var(--radius);padding:14px;border:1px solid var(--gray2);margin-bottom:10px}
.odc-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px}
.odc-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f5f2ee}
.odc-row:last-child{border:none}
.odc-key{color:var(--gray3)}
.odc-val{font-weight:600;color:var(--text)}
.reorder-btn{width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:12px;padding:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}

/* merchant */
.merch-hdr{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.merch-hdr h1{color:#fff;font-size:15px;font-weight:700}
.toggle-wrap{display:flex;align-items:center;gap:8px}
.tog-lbl{font-size:11px;font-weight:700}
.tog{width:44px;height:24px;border-radius:12px;background:#555;position:relative;cursor:pointer;transition:background .2s}
.tog.on{background:#27a060}
.tog-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog.on .tog-knob{left:23px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px}
.stat-card{background:#fff;border-radius:10px;padding:10px;text-align:center;border:1px solid var(--gray2)}
.stat-val{font-size:18px;font-weight:800;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--gray3);margin-top:2px}
.tab-row{display:flex;gap:6px;padding:8px 14px 0;flex-shrink:0;background:var(--bg)}
.tab{padding:7px 16px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.tab.on{background:var(--brand);color:#fff}
.tab.off{background:#fff;color:var(--gray4)}
.order-card{margin:8px 14px 0;background:#fff;border-radius:var(--radius);padding:12px 14px;border:1px solid var(--gray2)}
.oc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.oc-num{font-size:13px;font-weight:800;color:var(--text)}
.oc-meta{font-size:10px;color:var(--gray3);margin-top:2px}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.b-pending{background:#fff3e0;color:#e65100}
.b-confirmed{background:#e3f2fd;color:#1565c0}
.b-preparing{background:#e3f2fd;color:#1565c0}
.b-ready{background:#ede7f6;color:#4527a0}
.b-transit{background:#ede7f6;color:#4527a0}
.b-delivered{background:#e8f5e9;color:#1b5e20}
.oc-items{font-size:11px;color:var(--gray3);margin-bottom:9px;line-height:1.5}
.oc-foot{display:flex;justify-content:space-between;align-items:center}
.oc-total{font-size:13px;font-weight:800;color:var(--brand)}
.adv-btn{background:#1a1a1a;color:#fff;border:none;border-radius:9px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.menu-item-row{margin:8px 14px 0;background:#fff;border-radius:var(--radius);padding:12px 14px;border:1px solid var(--gray2);display:flex;justify-content:space-between;align-items:center}
.mir-name{font-size:12px;font-weight:700;color:var(--text)}
.mir-price{font-size:12px;font-weight:700;color:var(--brand);margin-top:2px}
.mir-edit{background:var(--gray1);border:none;border-radius:8px;padding:5px 11px;font-size:10px;font-weight:700;cursor:pointer;color:var(--gray4);font-family:inherit}

/* admin */
.adm{background:#0d0d14;flex:1;display:flex;flex-direction:column;overflow:hidden}
.adm-hdr{background:#14141e;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e2e;flex-shrink:0}
.adm-hdr h1{color:#fff;font-size:15px;font-weight:700}
.adm-hdr .sub{color:#555;font-size:11px;margin-top:1px}
.live-pip{width:8px;height:8px;border-radius:50%;background:var(--brand);box-shadow:0 0 8px var(--brand);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.adm-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px;flex-shrink:0}
.adm-stat{border-radius:12px;padding:12px;border:1px solid}
.adm-stat .al{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.adm-stat .av{font-size:22px;font-weight:900}
.adm-stat .ad{font-size:10px;margin-top:3px}
.adm-tabs{display:flex;gap:5px;padding:8px 14px 0;flex-shrink:0}
.adm-tab{padding:6px 13px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.adm-tab.on{background:var(--brand);color:#fff}
.adm-tab.off{background:#1e1e2e;color:#666}
.adm-list{flex:1;overflow-y:auto;padding:8px 14px 16px;scrollbar-width:none}
.adm-list::-webkit-scrollbar{display:none}
.adm-card{background:#14141e;border:1px solid #1e1e2e;border-radius:var(--radius);padding:11px 13px;margin-bottom:7px}
.adm-card .an{font-size:12px;font-weight:700;color:#fff}
.adm-card .as{font-size:10px;color:#555;margin-top:2px}
.adm-card .at{font-size:13px;font-weight:800;color:var(--brand);margin-top:5px}
.rider-row{display:flex;justify-content:space-between;align-items:center}
.rider-av{width:36px;height:36px;border-radius:50%;background:#1e1e2e;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#888;flex-shrink:0}
.rider-info .rn{font-size:12px;font-weight:700;color:#fff}
.rider-info .rm{font-size:10px;color:#555;margin-top:2px}
.r-online{color:#27a060;font-size:10px;font-weight:700}
.r-offline{color:#555;font-size:10px;font-weight:700}
.merch-row{display:flex;justify-content:space-between;align-items:center}
.merch-info .mn{font-size:12px;font-weight:700;color:#fff}
.merch-info .mm{font-size:10px;color:#555;margin-top:2px}
.m-open{color:#27a060;font-size:10px;font-weight:700}
.m-closed{color:#e24b4a;font-size:10px;font-weight:700}
.adm-action-row{display:flex;gap:5px;margin-top:6px;justify-content:flex-end}
.adm-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;border:none;cursor:pointer;font-family:inherit}

/* comparison banner */
.compare-bar{margin:0 14px 10px;background:#edfaf3;border:1px solid #b8e8cd;border-radius:10px;padding:10px 12px;font-size:11px;font-weight:600;color:#1b5e20;display:flex;align-items:center;gap:8px}
.compare-bar span{font-size:16px}
</style>
</head>
<body>

<div class="shell">
  <div class="top-nav">
    <button class="tnb active" id="btn-customer" onclick="switchPanel('customer')">📱 Customer</button>
    <button class="tnb" id="btn-merchant" onclick="switchPanel('merchant')">🍽️ Merchant</button>
    <button class="tnb" id="btn-admin"    onclick="switchPanel('admin')">⚡ Admin</button>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="screen-wrap">
      <div class="screen" id="screen"></div>
    </div>
  </div>
</div>

const cartTotal = () => S.cart.reduce((s,i)=>s+i.price*i.qty,0);

function go(screen,...args){ S.screen=screen; if(args[0]) S.selRest=args[0]; render(); }

function switchPanel(p){
  S.panel=p; S.screen='home';
  ['customer','merchant','admin'].forEach(id=>{
    document.getElementById('btn-'+id)?.classList.toggle('active',id===p);
  });
  render();
}

// ── RENDER ROUTER ────────────────────────────────────────────
function render(){
  const sc = document.getElementById('screen');
  if(!sc) return;
  if(S.panel==='customer'){
    if(S.screen==='home')     sc.innerHTML = homeScreen();
    else if(S.screen==='menu')     sc.innerHTML = menuScreen();
    else if(S.screen==='cart')     sc.innerHTML = cartScreen();
    else if(S.screen==='addr')     sc.innerHTML = addrScreen();
    else if(S.screen==='tracking') sc.innerHTML = trackingScreen();
  } else if(S.panel==='merchant'){
    sc.innerHTML = merchantScreen();
  } else {
    sc.innerHTML = adminScreen();
  }
}

        <div class="track-title">${S.trackStep>=4?'Delivered!':'On its way!'}</div>
        <div class="track-sub">From ${S.selRest?.name||'Inganzo'} to your door</div>
        <div class="track-num">VK-2025-01046</div>
      </div>
      ${S.trackStep<4?`<div class="eta-bar">
        <div><div class="eta-lbl">Estimated arrival</div><div class="eta-val">${S.trackStep===1?'~35 min':S.trackStep===2?'~25 min':'~12 min'}</div></div>
        <div style="text-align:right"><div class="eta-lbl">Payment</div><div style="font-size:13px;font-weight:700;color:#27a060">${S.payMethod==='cash'?'Cash on delivery':'Paid ✓'}</div></div>
      </div>`:''}
      <div class="steps">
        ${steps.map((s,i)=>`
          <div class="step ${i<S.trackStep?'done':''}">
            <div class="step-dot ${i<S.trackStep?'done':i===S.trackStep-1&&S.trackStep>i?'active':''}">${i<S.trackStep?'✓':i+1}</div>
            <div class="step-body">
              <div class="step-label ${i<S.trackStep?'done':''}">${s.label}</div>
              <div class="step-note">${s.note}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="order-detail-card" style="margin-top:20px">
        <div class="odc-title">Order summary</div>
        ${(S.cart.length?S.cart:[{name:'Hearty Inganzo Breakfast',qty:1,price:12000},{name:'Grilled T-Bone Steak',qty:1,price:16000}]).map(i=>`
          <div class="odc-row"><span class="odc-key">${i.name} ×${i.qty}</span><span class="odc-val">${fmt(i.price*i.qty)}</span></div>`).join('')}
        <div class="odc-row"><span class="odc-key">Delivery fee</span><span class="odc-val" style="color:#27a060">1,000 RWF</span></div>
        <div class="odc-row" style="border-top:1px solid var(--gray2);padding-top:8px;margin-top:4px"><span class="odc-key" style="font-weight:700;color:var(--text)">Total</span><span class="odc-val" style="color:var(--brand)">${fmt(total)}</span></div>
      </div>
      <button class="reorder-btn" onclick="S.cart=[];S.trackStep=1;if(S.trackTimer)clearInterval(S.trackTimer);go('home')">Back to home</button>
    </div>`;
}

// ── MERCHANT ─────────────────────────────────────────────────
function merchantScreen(){
  const statusFlow = {pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'in_transit'};
  const nextLabel  = {pending:'Confirm',confirmed:'Start Cooking',preparing:'Mark Ready',ready:'Dispatch'};
  const badgeCls   = {pending:'b-pending',confirmed:'b-confirmed',preparing:'b-preparing',ready:'b-ready',in_transit:'b-transit',delivered:'b-delivered'};
  const badgeLbl   = {pending:'Pending',confirmed:'Confirmed',preparing:'Preparing',ready:'Ready',in_transit:'In Transit',delivered:'Delivered'};

  const activeOrders = S.merchantOrders.filter(o=>o.status!=='delivered');
  const todayRev = S.merchantOrders.reduce((s,o)=>s+o.total,0);

  return `
    <div class="merch-hdr">
      <div><h1>Inganzo</h1><div class="sub">Merchant dashboard</div></div>
      <div class="toggle-wrap">
        <span class="tog-lbl" style="color:${S.merchantOpen?'#27a060':'#e24b4a'}">${S.merchantOpen?'OPEN':'CLOSED'}</span>
        <div class="tog ${S.merchantOpen?'on':''}" onclick="S.merchantOpen=!S.merchantOpen;render()"><div class="tog-knob"></div></div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${activeOrders.length}</div><div class="stat-lbl">Active orders</div></div>
      <div class="stat-card"><div class="stat-val">${(todayRev/1000).toFixed(0)}K</div><div class="stat-lbl">Revenue (RWF)</div></div>
      <div class="stat-card"><div class="stat-val">★ 4.9</div><div class="stat-lbl">Rating</div></div>
    </div>
    <div class="tab-row">
      <button class="tab ${S.merchantTab==='orders'?'on':'off'}" onclick="S.merchantTab='orders';render()">Orders (${activeOrders.length})</button>
      <button class="tab ${S.merchantTab==='menu'?'on':'off'}" onclick="S.merchantTab='menu';render()">Menu</button>
    </div>
    <div style="flex:1;overflow-y:auto;padding-bottom:16px">
    ${S.merchantTab==='orders'?
      (S.merchantOrders.length===0?`<div style="padding:40px 20px;text-align:center;color:var(--gray3);font-size:13px">No active orders</div>`:
      S.merchantOrders.map((o,i)=>`
        <div class="order-card">
          <div class="oc-head">
            <div><div class="oc-num">${o.id}</div><div class="oc-meta">${o.cust} · ${o.time}</div></div>
            <span class="badge ${badgeCls[o.status]||'b-pending'}">${badgeLbl[o.status]}</span>
          </div>
          <div class="oc-items">${o.items.join(', ')}</div>
          <div class="oc-foot">
            <span class="oc-total">${fmt(o.total)}</span>
            ${statusFlow[o.status]?`<button class="adv-btn" onclick="advanceMerchOrder(${i})">→ ${nextLabel[o.status]}</button>`:
            `<span style="font-size:11px;color:var(--gray3)">Complete</span>`}
          </div>
        </div>`).join(''))
    :RESTS.find(r=>r.id==='inganzo').items.map(item=>`
        <div class="menu-item-row">
          <div><div class="mir-name">${item.n}</div><div class="mir-price">${fmt(item.p)}</div></div>
          <button class="mir-edit">Edit</button>
        </div>`).join('')}
    </div>`;
}

      </div>

        <div class="al" style="color:#2563eb">Riders online</div>
        <div class="av" style="color:#2563eb">5</div>
        <div class="ad" style="color:#27a060">Avg 10.4 deliveries</div>
      </div>
      <div class="adm-stat" style="background:#7c3aed15;border-color:#7c3aed40">
        <div class="al" style="color:#9f7aea">Revenue today</div>
        <div class="av" style="color:#9f7aea">${(todayRev/1000).toFixed(0)}K</div>
        <div class="ad" style="color:#27a060">+22% this week</div>
      </div>
    </div>
    <div class="adm-tabs">
      ${['overview','orders','riders','merchants'].map(t=>`
        <button class="adm-tab ${S.adminTab===t?'on':'off'}" onclick="S.adminTab='${t}';render()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>
    <div class="adm-list">
    ${S.adminTab==='overview'?`
      <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.5px;padding:8px 0 6px;font-weight:700">Live orders</div>
      ${S.orders.slice(0,4).map(o=>`
        <div class="adm-card">
          <div style="display:flex;justify-content:space-between;align-items:start">
            <span class="an">${o.id}</span>

    :S.adminTab==='orders'?S.orders.map(o=>`
        <div class="adm-card">
          <div style="display:flex;justify-content:space-between">
            <span class="an">${o.id}</span>
            <span class="badge ${badgeCls[o.status]||'b-pending'}">${badgeLbl[o.status]}</span>
          </div>
          <div class="as">${o.cust} · ${o.time}</div>
          <div class="as" style="margin-top:2px">${o.items.join(', ')}</div>

    :S.adminTab==='riders'?RIDERS.map(r=>`
        <div class="adm-card">
          <div class="rider-row">
            <div style="display:flex;gap:10px;align-items:center">
              <div class="rider-av">${r.name.split(' ').map(x=>x[0]).join('')}</div>

                <div class="rn">${r.name}</div>

              <div class="${r.online?'r-online':'r-offline'}">${r.online?'ONLINE':'OFFLINE'}</div>
              <div style="font-size:10px;color:#555;margin-top:2px">${r.city}</div>
            </div>
          </div>
        </div>`).join('')
    :RESTS.map(r=>`
        <div class="adm-card">
          <div class="merch-row">
            <div class="merch-info">
              <div class="mn">${r.name}</div>
              <div class="mm">${r.cat} · ★ ${r.r} · ${r.t}m</div>
            </div>
            <div style="text-align:right">
              <div class="${r.open?'m-open':'m-closed'}">${r.open?'OPEN':'CLOSED'}</div>
              <div style="font-size:10px;color:#555;margin-top:3px">1,000 RWF fee</div>
            </div>
          </div>
        </div>`).join('')}

}

// ── ACTIONS ───────────────────────────────────────────────────
function addItem(name, desc, price){
  const e = S.cart.find(i=>i.name===name);
  if(e){ e.qty++; } else { S.cart.push({name,desc,price,qty:1}); }
  render();
}
function removeItem(name){
  const idx = S.cart.findIndex(i=>i.name===name);
  if(idx===-1) return;
  if(S.cart[idx].qty>1){ S.cart[idx].qty--; } else { S.cart.splice(idx,1); }
  render();
}
function placeOrder(){
  S.cart=[];
  S.trackStep=1;
  if(S.trackTimer) clearInterval(S.trackTimer);
  S.screen='tracking';
  render();
  S.trackTimer = setInterval(()=>{
    S.trackStep++;
    render();
    if(S.trackStep>=4) clearInterval(S.trackTimer);
  }, 2200);
}
function advanceMerchOrder(idx){
  const flow = {pending:'confirmed',confirmed:'preparing',preparing:'ready',ready:'in_transit'};
  const cur = S.merchantOrders[idx].status;
  if(flow[cur]){ S.merchantOrders[idx].status=flow[cur]; render(); }
}

render();
</script>
